<!DOCTYPE html>
<html ng-app="mathApp">
<head>
    <title>AngularJS Arithmetic</title>
    <!-- AngularJS CDN Library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    
    <style>
        [ng-cloak] { display: none !important; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .calc-card { background: white; padding: 30px; border-radius: 12px; shadow: 0 8px 24px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        .global-stats { color: #7f8c8d; font-size: 13px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 2px solid #e1e4e8; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-group { margin: 15px 0; display: flex; justify-content: space-around; }
        button { padding: 12px 18px; border: none; border-radius: 6px; background: #3498db; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2980b9; transform: scale(1.05); }
        .result-box { margin-top: 20px; font-size: 24px; color: #2c3e50; }
        .error { color: #e74c3c; font-size: 14px; }
    </style>
</head>
<body ng-cloak>

    <div class="calc-card" ng-controller="MathController">
        <!-- RootScope Data (Global) -->
        <h2>{{appName}}</h2>
        <div class="global-stats">Total Calculations Made: {{calcCount}}</div>

        <!-- Scope Data (Local to Controller) -->
        <input type="number" ng-model="num1" placeholder="First Number">
        <input type="number" ng-model="num2" placeholder="Second Number">

        <div class="btn-group">
            <button ng-click="calculate('+')">+</button>
            <button ng-click="calculate('-')">-</button>
            <button ng-click="calculate('*')">×</button>
            <button ng-click="calculate('/')">÷</button>
        </div>

        <div class="result-box">
            <span ng-if="result !== undefined">Result: <strong>{{result}}</strong></span>
        </div>
    </div>

    <script>
        var app = angular.module('mathApp', []);

        // Use $rootScope for variables accessible across the entire app
        app.run(function($rootScope) {
            $rootScope.appName = "Arithmetic Pro";
            $rootScope.calcCount = 0;
        });

        // Use $scope for logic specific to this controller
        app.controller('MathController', function($scope, $rootScope) {
            $scope.calculate = function(operator) {
                if ($scope.num1 === undefined || $scope.num2 === undefined) return;

                switch(operator) {
                    case '+': $scope.result = $scope.num1 + $scope.num2; break;
                    case '-': $scope.result = $scope.num1 - $scope.num2; break;
                    case '*': $scope.result = $scope.num1 * $scope.num2; break;
                    case '/': 
                        $scope.result = ($scope.num2 !== 0) ? ($scope.num1 / $scope.num2).toFixed(2) : "Div by 0!";
                        break;
                }
                
                // Update the global counter in $rootScope
                $rootScope.calcCount++;
            };
        });
    </script>
</body>
</html>
